<!DOCTYPE html>
<html>
<head>
    <title>Multi-Cloud App</title>
</head>
<body>
    <h1>Hello from AWS &#128640;</h1>
    <p id="azure-msg">Calling Azure...</p>

    <script>
        fetch("https://multi-cloud-plan-czbyeqg5dhdeebbg.canadacentral-01.azurewebsites.net/api/message")
        .then(res => res.json())
        .then(data => {
            document.getElementById("azure-msg").innerText = "Response: " + data.message;
        })
        .catch(err => {
            document.getElementById("azure-msg").innerText = "Error: " + err;
        });
    </script>
</body>
</html>
